name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_name: git-heatmap
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_name: git-heatmap
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_name: git-heatmap
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_name: git-heatmap.exe

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: package (unix)
        if: matrix.archive == 'tar.gz'
        working-directory: target/${{ matrix.target }}/release
        run: |
          mkdir -p bin
          mv ${{ matrix.bin_name }} bin/
          tar -czf ../../../git-heatmap-${{ matrix.target }}.tar.gz bin

      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Move-Item target/${{ matrix.target }}/release/${{ matrix.bin_name }} bin/
          Compress-Archive -Force -Path bin/* -DestinationPath git-heatmap-${{ matrix.target }}.zip

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-heatmap-${{ matrix.target }}
          path: git-heatmap-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/git-heatmap-x86_64-unknown-linux-gnu/*
            artifacts/git-heatmap-x86_64-apple-darwin/*
            artifacts/git-heatmap-aarch64-apple-darwin/*
            artifacts/git-heatmap-x86_64-pc-windows-msvc/*

      - name: write release body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## git-heatmap ${{ github.ref_name }}

            4 Git activity charts + personal commit count, in Rust.

            | Platform | Asset |
            | --- | --- |
            | Linux (x86_64) | `git-heatmap-x86_64-unknown-linux-gnu.tar.gz` |
            | macOS (Intel) | `git-heatmap-x86_64-apple-darwin.tar.gz` |
            | macOS (Apple Silicon) | `git-heatmap-aarch64-apple-darwin.tar.gz` |
            | Windows (x86_64) | `git-heatmap-x86_64-pc-windows-msvc.zip` |

            ### Install (after download)

            ```bash
            tar -xzf git-heatmap-<your-target>.tar.gz
            mkdir -p ~/.claude/plugins/git-heatmap
            cp -r bin ~/.claude/plugins/git-heatmap/
            ```

            Then register the plugin via your local marketplace.